name: Machine Learning CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  train-track-and-docker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install mlflow pandas numpy scikit-learn matplotlib seaborn

    - name: Run MLflow Project (Re-training)
      run: |
        mlflow run ./MLProject --entry-point main -P n_estimators=100 --no-conda

    - name: Upload Model Artifacts to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-model-artifacts
        path: mlruns/

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.HUB_USERNAME }}
        password: ${{ secrets.HUB_TOKEN }}

    - name: Build Docker Image via MLflow
      run: |
        mlflow models build-docker -m "$(find mlruns/0 -type d -name "model" | head -n 1)" -n "${{ secrets.HUB_USERNAME }}/getcontact-sentiment:latest"

    - name: Push Docker Image to Docker Hub
      run: |
        docker push ${{ secrets.HUB_USERNAME }}/getcontact-sentiment:latest
