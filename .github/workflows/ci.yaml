name: CI Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12.7"

    - name: Check Environment
      run: |
        python --version
        pip --version
        pwd
        ls -la

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow scikit-learn pandas numpy google-api-python-client google-auth-httplib2 google-auth-oauthlib joblib

    - name: Run MLflow Project (Re-training)
      env:
        GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      run: |
        mlflow run MLProject --entry-point main --env-manager local

    - name: Upload Model Artifacts to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-model-artifacts
        path: mlruns/
        
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: "${{ secrets.HUB_USERNAME }}"
        password: "${{ secrets.HUB_TOKEN }}"

    - name: Build Docker Image via MLflow
      run: |
        mlflow models build-docker -m "$(find mlruns/0 -type d -name "model" | head -n 1)" -n "${{ secrets.HUB_USERNAME }}/mlflow-model-image:latest"

    - name: Tag Docker Image
      run: |
        docker tag mlflow-model-image:latest "${{ secrets.HUB_USERNAME }}/mlflow-model-image:latest"

    - name: Push Docker Image
      run: |
        docker push "${{ secrets.HUB_USERNAME }}/mlflow-model-image:latest"
