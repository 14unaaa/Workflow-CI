name: CI Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: "3.12.7"

    - name: Check Environment
      run: |
        python --version
        pip --version
        pwd
        ls -la

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow scikit-learn pandas numpy google-api-python-client google-auth-httplib2 google-auth-oauthlib joblib

    - name: Run MLflow Project (Re-training)
      env:
        GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      run: |
        mlflow run MLProject --entry-point main --env-manager local

    - name: Get Latest MLflow Run ID
      id: get_run_id
      run: |
        RUN_ID=$(cat MLProject/latest_run_id.txt)
        echo "MLFLOW_RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Terdeteksi Run ID terbaru: $RUN_ID"

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: "${{ secrets.HUB_USERNAME }}"
        password: "${{ secrets.HUB_TOKEN }}"

    - name: Build Docker Model via MLflow
      run: |
        mlflow models build-docker -m runs:/$MLFLOW_RUN_ID/model_artifact -n mlflow-model-image

    - name: Tag Docker Image
      run: |
        # Mengarahkan tag ke registri tujuan: 14unaa/sml
        docker tag mlflow-model-image:latest "${{ secrets.HUB_USERNAME }}/sml:latest"

    - name: Push Docker Image
      run: |
        docker push "${{ secrets.HUB_USERNAME }}/sml:latest"
