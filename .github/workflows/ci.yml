name: Machine Learning Workflow CI

on:
  push:
    branches:
      - main

jobs:
  mlflow-ci-workflow:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas scikit-learn virtualenv

    - name: Run MLflow Project
      run: |
        mlflow run ./MLProject_Folder --entry-point main -P n_estimators=100 --no-conda

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Build Docker Image
      run: |
        # MLflow run otomatis membuat folder mlruns di root direktori runner.
        # Kita cari folder run ID terbaru secara dinamis pada path yang benar:
        LATEST_RUN=$(ls -td mlruns/0/*/ | head -1)
        echo "Menggunakan run artifak dari lokasi: ${LATEST_RUN}"
        
        # Build image menggunakan path yang valid
        mlflow models build-docker -m "${LATEST_RUN}artifacts/model" -n "${{ secrets.DOCKER_HUB_USERNAME }}/getcontact-model:latest" --enable-mlflow-deployment

    - name: Push Docker Image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/getcontact-model:latest

    - name: Upload to GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automated Bot: Upload re-trained model artifacts [skip ci]"
        file_pattern: 'mlruns/*'
