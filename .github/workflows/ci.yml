name: Machine Learning Workflow CI

on:
  push:
    branches:
      - main

jobs:
  mlflow-ci-workflow:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Tambahkan virtualenv di baris ini untuk mengatasi eror konfigurasi MLflow
        pip install mlflow pandas scikit-learn virtualenv

    - name: Run MLflow Project
      run: |
        mlflow run ./MLProject_Folder --entry-point main -P n_estimators=100 --no-conda

    - name: Upload to GitHub (Save Artifacts)
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automated Bot: Upload re-trained model artifacts [skip ci]"
        file_pattern: 'MLProject_Folder/mlruns/*'
